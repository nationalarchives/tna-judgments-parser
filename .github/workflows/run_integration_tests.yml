name: Run Integrations Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Set up .NET environment (assuming C# is the primary language)
      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x' # Adjust to your target version

      # Install dependencies
      - name: Install dependencies
        run: dotnet restore tna-judgments-parser.sln

      # Build
      - name: Build
        run: dotnet build tna-judgments-parser.sln --no-restore --configuration release

      # Run tests
      - name: Run tests
        env:
          XUNIT_PRINT_MAX_STRING_LENGTH: 100
        run: dotnet test tna-judgments-parser.sln --no-build --configuration release
