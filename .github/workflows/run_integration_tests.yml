name: Run Integrations Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Set up .NET environment (assuming C# is the primary language)
      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '8.0.x' # Adjust to your target version

      # Install dependencies
      - name: Install dependencies
        run: dotnet restore tna-judgments-parser.sln

      # Build
      - name: Build
        run: dotnet build tna-judgments-parser.sln --no-restore --configuration release

      # Run tests
      - name: Run tests
        env:
          XUNIT_PRINT_MAX_STRING_LENGTH: 100
        run: dotnet test tna-judgments-parser.sln --no-build --configuration release
